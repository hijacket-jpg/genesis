<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Para Genesis</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Indie+Flower&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #0d0d0d, #4b004b, #ff66b2);
      font-family: 'Indie Flower', cursive;
      color: #fff;
      overflow: hidden;
      height: 100vh;
    }

    h1 {
      font-family: 'Great Vibes', cursive;
      font-size: 5em;
      margin-top: 40px;
      color: #ffccff;
      text-shadow: 2px 2px 12px #000;
      text-align: center;
    }

    .frase {
      position: absolute;
      font-size: 1.4em;
      max-width: 250px;
      text-shadow: 1px 1px 6px #000;
    }

    .f1 { top: 20%; left: 10%; }
    .f2 { top: 70%; left: 15%; }
    .f3 { top: 40%; right: 10%; }

    .galeria {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 40px;
    }

    .corazon {
      width: 200px;
      height: 180px;
      position: relative;
      background: #ff66b2;
      transform: rotate(-45deg);
      margin: 20px;
      box-shadow: 0 0 15px rgba(255, 102, 178, 0.8);
      overflow: hidden;
    }

    .corazon::before { top: -100px; left: 0; }
    .corazon::after { left: 100px; top: 0; }

    .corazon img {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: none;  
    transition: transform 0.5s ease;
    }    

    .corazon:hover img {
    transform: scale(1.1); /* zoom al pasar el mouse */
    }

    /* Corazones flotando */
    .floating-heart {
      position: absolute;
      color: #ff66b2;
      font-size: 24px;
      animation: floatUp 6s linear infinite;
    }

    @keyframes floatUp {
      0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
    }

    /* Estrellas en esquinas */
    .estrella {
      position: absolute;
      font-size: 4em; /* más grandes */
      color: #ffff99;
      text-shadow: 0 0 12px #fff, 0 0 20px #ffccff;
    }
    .top-left { top: 10px; left: 10px; }
    .top-right { top: 10px; right: 10px; }
    .bottom-left { bottom: 10px; left: 10px; }
    .bottom-right { bottom: 10px; right: 10px; }

    /* Responsivo */
    @media (max-width: 768px) {
      h1 { font-size: 3em; }
      .frase { font-size: 1em; max-width: 180px; }
      .corazon { width: 150px; height: 130px; }
      .corazon::before, .corazon::after { width: 150px; height: 150px; }
      .estrella { font-size: 3em; }
    }

    @media (max-width: 480px) {
      h1 { font-size: 2.5em; }
      .frase { font-size: 0.9em; max-width: 150px; }
      .corazon { width: 120px; height: 100px; }
      .corazon::before, .corazon::after { width: 120px; height: 120px; }
      .estrella { font-size: 2.5em; }
    }
  </style>
</head>
<body>
  <h1>GENESIS</h1>

  <div class="frase f1">Oh darling</div>
  <div class="frase f2">Pretty lady</div>
  <div class="frase f3">Tan dulce como las galletitas,<br>tan linda como las rosas<br>y con espinas que estaría dispuesto<br>a tocar para mostrar cuánto me importas.</div>

  <div class="galeria">
    <div class="corazon"><img src="IMG-20260524-WA0025.jpg" alt="Foto 1"></div>
    <div class="corazon"><img src="IMG-20260524-WA0026.jpg" alt="Foto 2"></div>
    <div class="corazon"><img src="IMG-20260524-WA0027.jpg" alt="Foto 3"></div>
    <div class="corazon"><img src="IMG-20260524-WA0028.jpg" alt="Foto 4"></div>
  </div>

  <div class="estrella top-left">★</div>
  <div class="estrella top-right">★</div>
  <div class="estrella bottom-left">★</div>
  <div class="estrella bottom-right">★</div>

  <script>
    function crearCorazon() {
      const heart = document.createElement("div");
      heart.classList.add("floating-heart");
      heart.innerHTML = "❤";
      heart.style.left = Math.random() * window.innerWidth + "px";
      heart.style.fontSize = (20 + Math.random() * 30) + "px";
      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 6000);
    }

    setInterval(crearCorazon, 500);
  </script>
</body>
</html>
